<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI·데이터 RSS 트렌드 브리핑 아카이브</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div>
          <p class="eyebrow">Serverless RSS Monitor</p>
          <h1>AI·데이터 기반 콘텐츠 전략가를 위한 RSS 트렌드 브리핑 아카이브</h1>
        </div>
        <button id="refreshButton" class="refresh-button" type="button">새로고침</button>
      </div>
    </header>

    <main class="dashboard">
      <section class="summary-panel" aria-label="수집 현황">
        <div>
          <span class="summary-label">마지막 업데이트</span>
          <strong id="updatedAt">-</strong>
        </div>
        <div>
          <span class="summary-label">전체 항목 수</span>
          <strong id="totalItems">0</strong>
        </div>
      </section>

      <section class="toolbar" aria-label="그룹 필터">
        <button class="filter-button active" type="button" data-group="all">전체</button>
        <button class="filter-button" type="button" data-group="news">뉴스</button>
        <button class="filter-button" type="button" data-group="tech_blog">기술블로그</button>
        <button class="filter-button" type="button" data-group="ai_data">AI·데이터</button>
      </section>

      <p id="statusMessage" class="status-message" role="status"></p>
      <section id="itemsList" class="items-list" aria-label="최신 항목 리스트"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
